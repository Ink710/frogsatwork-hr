name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    # Non-secret localhost URLs (identical to the committed .env.test) so the Prisma CLI can
    # resolve the datasource in `prisma.config.ts` — `prisma generate` validates the config even
    # though codegen never connects. There is no .env in CI (secrets aren't committed), so without
    # this the config's env("DIRECT_URL") throws PrismaConfigEnvError. Points at the service below.
    env:
      DATABASE_URL: postgresql://hris_app:hris_app_pw@localhost:5433/hris_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5433/hris_test?schema=public

    # Postgres for the integration tests. Mapped to host 5433 so it matches .env.test and
    # test/globalSetup.js (which use localhost:5433) with no changes. The test harness
    # itself creates the hris_app role, the hris_test database, migrations, and seed.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @hris/database exec prisma generate

      - name: Lint
        run: pnpm --filter employee-records lint

      - name: Test (unit + integration)
        run: pnpm test
