packages:
  - "apps/*"
  - "packages/*"

# Dependencies whose install/build scripts we explicitly trust to run.
# pnpm blocks postinstall scripts by default (supply-chain safety); these are ones
# we need (Prisma downloads its engine, sharp compiles image bindings, etc.).
allowBuilds:
  '@prisma/engines': true
  prisma: true
  sharp: true
  unrs-resolver: true
